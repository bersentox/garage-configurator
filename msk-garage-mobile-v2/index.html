<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MSK Garage Mobile V2</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <main class="hero idle" id="hero">
    <div class="scene-visual">
      <img class="scene" src="./images/scene/front.webp" alt="" />

      <div class="gate-mask">
        <div class="gate-content">
          <img class="gate-overlay" src="./images/scene/gate.webp" alt="" />
        </div>
      </div>

      <div class="scene-brand">
        <img class="scene-logo" src="../images/garages/scene/logo11.webp" alt="MSK Garage" />
        <div class="scene-brand-title">MSK-GARAGE</div>
        <div class="scene-brand-subtitle">ГАРАЖИ ИЗ СЭНДВИЧ-ПАНЕЛЕЙ</div>
      </div>
    </div>

    <audio id="garageGateSound" preload="auto">
      <source src="./audio/gate-opening.mp3" type="audio/mpeg" />
    </audio>

    <div class="scene-instruction" id="sceneInstruction">
      Чтобы собрать свой гараж — нажмите на пульт
    </div>

    <button class="scene-remote" id="openBtn" type="button" aria-pressed="false">
      <span class="scene-remote-body">
        <span class="scene-remote-light"></span>
        <span class="scene-remote-mark"></span>
      </span>
    </button>

    <div class="scene-choice" id="sceneChoice" aria-hidden="true">
      <button class="scene-choice-btn" type="button" data-garage-option="one" data-width-option="1">На 1 машину</button>
      <button class="scene-choice-btn" type="button" data-garage-option="two" data-width-option="2">На 2 машины</button>
    </div>
  </main>

  <script type="module" src="./app.js"></script>
</body>
</html>
