<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>MSK Garage Mobile V2</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app" aria-label="Garage hero scene">
      <div id="scene-root" class="scene-layer" aria-hidden="true"></div>

      <header class="top-layer">
        <p class="eyebrow">Mobile V2</p>
        <h1>Build your prefab garage</h1>
      </header>

      <section class="bottom-layer" aria-label="Garage size choices">
        <p class="choices-title">Choose size</p>
        <div id="size-choices" class="choice-list"></div>
      </section>
    </main>

    <script type="module" src="./app.js"></script>
  </body>
</html>
