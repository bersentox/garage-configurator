<section class="hero" id="heroStep">
  <div class="hero-inner">
    <div class="hero-scene">
      <div id="garageScene" class="garage-scene" aria-live="polite">
        <img class="garage-layer garage-background" data-embed-asset="images/garages/scene/background.webp" alt="Фон сцены гаража" />
        <img class="garage-layer garage-interior" data-embed-asset="images/garages/scene/interior.webp" alt="Интерьер гаража" />

        <div class="garage-gate-mask" aria-hidden="true">
          <div class="garage-gate-content">
            <img class="garage-gate" data-embed-asset="images/garages/scene/gate.webp" alt="Ворота гаража" />
            <span class="garage-gate-text">Чтобы собрать свой гараж — нажмите на пульт</span>
          </div>
        </div>

        <img class="garage-layer garage-front" data-embed-asset="images/garages/scene/front.webp" alt="Передний план гаража" />

        <div class="garage-brand" aria-hidden="true">
          <img class="garage-brand-logo" data-embed-asset="images/garages/scene/logo11.webp" alt="Логотип MSK-GARAGE" />
          <span class="garage-brand-title">MSK-GARAGE</span>
          <span class="garage-brand-subtitle">гаражи из сэндвич-панелей</span>
        </div>

        <button id="garageRemoteButton" class="garage-remote" type="button" aria-label="Открыть ворота" aria-pressed="false">
          <span class="garage-remote-dot" aria-hidden="true"></span>
          <span class="garage-remote-line" aria-hidden="true"></span>
          <span class="garage-remote-label">🏠</span>
        </button>

        <div class="garage-interior-ui" aria-hidden="true">
          <div class="garage-interior-buttons">
            <button class="garage-choice" type="button" data-width="6">
              <span class="garage-choice-main">1 МАШИНА</span>
              <span class="garage-choice-sub">/ 6 м</span>
            </button>

            <button class="garage-choice" type="button" data-width="8">
              <span class="garage-choice-main">2 МАШИНЫ</span>
              <span class="garage-choice-sub">/ 8 м</span>
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</section>
