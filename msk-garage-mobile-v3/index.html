<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>MSK Garage — вингсьют-каталог гаражей</title>
  <meta name="description" content="Листайте готовые гаражи с ценами. Увидели похожий — получите расчет в мессенджер. Не знаете размер — подберём за вас." />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div id="garage-v3-root" class="garage-v3-root">
    <div class="top-brand" aria-label="MSK Garage">
      <span class="brand-mark">MSK</span>
      <span class="brand-text">GARAGE</span>
    </div>

    <aside id="sectorHud" class="sector-hud" aria-live="polite">
      <span class="sector-kicker">Сектор 00</span>
      <strong>Старт</strong>
      <small>Лента загружается</small>
    </aside>

    <div id="sectorToast" class="sector-toast" aria-live="polite"></div>

    <main id="feed" class="feed" aria-label="Вингсьют-лента гаражей"></main>

    <nav class="sticky-cta" aria-label="Быстрая заявка">
      <button id="globalLeadButton" class="sticky-main" type="button">Подобрать и посчитать мой гараж</button>
      <a id="quickCall" class="sticky-call" href="tel:+79000000000">Позвонить</a>
    </nav>

    <section id="leadModal" class="lead-modal" aria-hidden="true">
      <button class="modal-backdrop" data-close-modal type="button" aria-label="Закрыть"></button>
      <div class="lead-sheet" role="dialog" aria-modal="true" aria-labelledby="leadTitle">
        <button class="sheet-close" data-close-modal type="button" aria-label="Закрыть">×</button>
        <p class="sheet-kicker">Гараж закреплён</p>
        <h2 id="leadTitle">Получить расчет в мессенджер</h2>
        <p id="leadIntro" class="sheet-intro"></p>
        <div id="leadCode" class="code-pill"></div>
        <p class="sheet-note">Цена придёт сразу. Следующие материалы открываются по шагам: район объекта → смета → комплектация → пример проекта.</p>
        <div id="messengerButtons" class="messenger-grid"></div>
        <button id="copyLeadText" class="copy-button" type="button">Скопировать сообщение</button>
      </div>
    </section>

    <section id="detailView" class="detail-view" aria-hidden="true">
      <div class="detail-topbar">
        <button id="detailClose" class="detail-close" type="button">← Назад в ленту</button>
        <span id="detailCode" class="detail-code"></span>
      </div>
      <div id="detailFeed" class="detail-feed" aria-label="Внутренняя лента выбранного гаража"></div>
    </section>
  </div>

  <script src="./data.js"></script>
  <script src="./app.js"></script>
</body>
</html>
