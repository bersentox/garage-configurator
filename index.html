<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Garage Configurator</title>
  <link rel="stylesheet" href="css/main.css?v=90" />
</head>
<body>

  <main class="page">
    <div id="configurator" class="configurator">

      <section id="step-start-scene" class="section">
        <h2 class="section-title">Стартовая сцена гаража</h2>

        <div id="garageScene" class="garage-scene" aria-live="polite">
          <img class="garage-layer garage-background" src="images/garages/scene/background.webp" alt="Фон сцены гаража" />
          <img class="garage-layer garage-interior" src="images/garages/scene/interior.webp" alt="Интерьер гаража" />
          <div class="garage-gate-mask" aria-hidden="true">
            <img class="garage-gate" src="images/garages/scene/gate.webp" alt="Ворота гаража" />
          </div>
          <img class="garage-layer garage-front" src="images/garages/scene/front.webp" alt="Передний план гаража" />

          <button id="garageRemoteButton" class="garage-remote" type="button" aria-label="Открыть или закрыть ворота" aria-pressed="false">
            <span class="garage-remote-dot" aria-hidden="true"></span>
            <span class="garage-remote-line" aria-hidden="true"></span>
            <span class="garage-remote-label">OPEN</span>
          </button>
        </div>
      </section>

      <section id="step-type" class="section">
        <h2 class="section-title">Выберите тип гаража</h2>

        <div class="cards cards-type">
          <button class="card type-card" type="button" data-width="6">
            <div class="card-image">
              <img src="https://raw.githubusercontent.com/bersentox/garage-configurator/main/images/garages/garage_6_long_gable_graphite.webp" alt="Гараж на 1 машину, 6 метров" />
            </div>
            <div class="card-body">
              <div class="card-title">Гараж на 1 машину</div>
              <div class="card-subtitle">6 метров</div>
            </div>
          </button>

          <button class="card type-card" type="button" data-width="8">
            <div class="card-image">
              <img src="https://raw.githubusercontent.com/bersentox/garage-configurator/main/images/garages/garage_8_long_gable_industrial.webp" alt="Гараж на 2 машины, 8 метров" />
            </div>
            <div class="card-body">
              <div class="card-title">Гараж на 2 машины</div>
              <div class="card-subtitle">8 метров</div>
            </div>
          </button>
        </div>
      </section>

      <section id="step-length" class="section"></section>

      <section id="step-config" class="section"></section>

      <section id="step-render" class="section"></section>

      <section id="step-price" class="section"></section>

      <section id="step-trust" class="section"></section>
      
      <section id="step-action" class="section"></section>

    </div>
  </main>

  <script src="js/prices.js?v=50"></script>
<script src="js/app.js?v=50"></script>
</body>
</html>
