<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Implementation / Construction — v2 (T123)</title>
  <style>
.icv2 {
  --icv2-bg: #f5faff;
  --icv2-text: #0f172a;
  --icv2-muted: #4d6079;
  --icv2-card-shadow:
    0 18px 45px rgba(18, 38, 72, 0.08),
    0 2px 8px rgba(18, 38, 72, 0.04);
  --icv2-card-shadow-hover:
    0 26px 54px rgba(18, 38, 72, 0.11),
    0 8px 18px rgba(18, 38, 72, 0.06);
  --icv2-card-shadow-open:
    0 32px 60px rgba(18, 38, 72, 0.13),
    0 8px 18px rgba(18, 38, 72, 0.07);
  --icv2-radius-xl: 24px;
  --icv2-radius-l: 20px;
  --icv2-ease: cubic-bezier(0.22, 1, 0.36, 1);
}

.icv2,
.icv2 *,
.icv2 *::before,
.icv2 *::after {
  box-sizing: border-box;
}

.icv2 {
  margin: 0;
  font-family: Inter, "Segoe UI", -apple-system, BlinkMacSystemFont, "Helvetica Neue", sans-serif;
  color: var(--icv2-text);
  position: relative;
  isolation: isolate;
  overflow: clip;
  padding: clamp(56px, 8vw, 96px) 0;
  background:
    linear-gradient(180deg, #f8fcff 0%, #f5faff 52%, #f7fbff 100%);
}

.icv2__ambient {
  position: absolute;
  inset: 0;
  pointer-events: none;
  background:
    radial-gradient(760px 440px at 12% 10%, rgba(121, 186, 255, 0.14), transparent 70%),
    radial-gradient(680px 400px at 88% 5%, rgba(194, 225, 255, 0.18), transparent 72%);
  z-index: -1;
}

.icv2__inner {
  width: min(1160px, calc(100% - 56px));
  margin: 0 auto;
}

.icv2__header {
  max-width: 920px;
  margin: 0 auto clamp(20px, 3vw, 26px);
  text-align: center;
}

.icv2__title {
  margin: 0;
  font-size: clamp(1.72rem, 3.15vw, 2.68rem);
  line-height: 1.08;
  letter-spacing: -0.03em;
  font-weight: 620;
  text-wrap: balance;
}

.icv2 .title-line {
  display: block;
}

.icv2 .title-line--light {
  font-weight: 500;
  color: rgba(15, 23, 42, 0.7);
}

.icv2 .title-line--strong {
  font-weight: 650;
  color: #0b1220;
}

.icv2__subtitle {
  margin: 18px auto 0;
  max-width: 720px;
  font-size: clamp(1rem, 1.4vw, 1.18rem);
  line-height: 1.62;
  letter-spacing: -0.012em;
  color: var(--icv2-muted);
  text-wrap: pretty;
}

.icv2__grid {
  display: grid;
  grid-template-columns: repeat(2, minmax(0, 1fr));
  gap: clamp(16px, 2.2vw, 26px);
  align-items: start;
}

.icv2__column-head {
  margin-bottom: 12px;
  padding-inline: 4px;
}

.icv2__eyebrow {
  display: inline-block;
  margin-bottom: 8px;
  font-size: 0.74rem;
  line-height: 1;
  letter-spacing: 0.16em;
  text-transform: uppercase;
  color: #6582aa;
  font-weight: 600;
}

.icv2__column-title {
  margin: 0;
  font-size: clamp(1.35rem, 2vw, 1.6rem);
  line-height: 1.1;
  letter-spacing: -0.025em;
  font-weight: 630;
}

.icv2__stack {
  display: grid;
  gap: 12px;
}

.icv2-card {
  border: 0;
  padding: 0;
  margin: 0;
  border-radius: var(--icv2-radius-l);
  background: #ffffff;
  box-shadow: var(--icv2-card-shadow);
  transition:
    transform 240ms var(--icv2-ease),
    box-shadow 240ms var(--icv2-ease);
}

.icv2-card:hover {
  transform: translateY(-3px);
  box-shadow: var(--icv2-card-shadow-hover);
}

.icv2-card.is-open {
  box-shadow: var(--icv2-card-shadow-open);
}

.icv2-card__trigger {
  width: 100%;
  border: 0;
  background: transparent;
  text-align: left;
  cursor: pointer;
  padding: 18px 20px;
  display: grid;
  grid-template-columns: auto minmax(0, 1fr);
  align-items: start;
  gap: 14px;
  color: inherit;
  font: inherit;
}

.icv2-card__trigger:focus-visible {
  outline: 2px solid rgba(77, 144, 224, 0.4);
  outline-offset: -2px;
  border-radius: var(--icv2-radius-l);
}

.icv2-card__number {
  margin-top: 2px;
  font-size: 0.72rem;
  font-weight: 720;
  letter-spacing: 0.18em;
  color: #8da4c2;
}

.icv2-card__title {
  margin: 0;
  font-size: 1.02rem;
  line-height: 1.34;
  letter-spacing: -0.016em;
  font-weight: 620;
  text-wrap: pretty;
}

.icv2-card__support {
  margin: 7px 0 0;
  color: #475f7f;
  font-size: 0.97rem;
  line-height: 1.52;
  letter-spacing: -0.003em;
  font-weight: 545;
  text-wrap: pretty;
}

.icv2-card__panel {
  height: 0;
  overflow: hidden;
  will-change: height;
  transition: height 340ms var(--icv2-ease);
}

.icv2-card__body {
  opacity: 0;
  transform: translateY(-4px);
  padding: 0 20px 20px 58px;
  transition:
    opacity 220ms ease,
    transform 260ms var(--icv2-ease);
}

.icv2-card.is-open .icv2-card__body {
  opacity: 1;
  transform: translateY(0);
}

.icv2-card__description {
  margin: 0;
  color: #30445f;
  font-size: 0.94rem;
  line-height: 1.68;
  letter-spacing: -0.006em;
  text-wrap: pretty;
}

@media (max-width: 980px) {
  .icv2__inner {
    width: min(900px, calc(100% - 34px));
  }

  .icv2__grid {
    grid-template-columns: 1fr;
  }
}

@media (max-width: 620px) {
  .icv2 {
    padding: 52px 0 68px;
  }

  .icv2__inner {
    width: calc(100% - 20px);
  }

  .icv2__title {
    font-size: clamp(1.62rem, 7.3vw, 2.18rem);
    line-height: 1.1;
  }

  .icv2-card__trigger {
    grid-template-columns: auto minmax(0, 1fr);
    gap: 11px;
    padding: 16px 16px;
  }

  .icv2-card__title {
    font-size: 0.98rem;
  }

  .icv2-card__support {
    font-size: 0.91rem;
  }

  .icv2-card__body {
    padding: 0 16px 16px 44px;
  }
}

@media (prefers-reduced-motion: reduce) {
  .icv2-card,
  .icv2-card__panel,
  .icv2-card__body {
    transition: none;
  }
}
  </style>
</head>
<body>
<section class="icv2" aria-labelledby="icv2-title">
  <div class="icv2__ambient" aria-hidden="true"></div>

  <div class="icv2__inner">
    <header class="icv2__header">
      <h2 id="icv2-title" class="icv2__title">
        <span class="title-line title-line--light">Вы инвестируете не в гараж</span>
        <span class="title-line title-line--strong">а в результат, который не разваливается на мелочах</span>
      </h2>
    </header>

    <div class="icv2__grid" role="group" aria-label="Реализация и конструкция">
      <section class="icv2__column" data-icv2-column="implementation" aria-labelledby="icv2-implementation-title">
        <div class="icv2__column-head">
          <span class="icv2__eyebrow">Подход</span>
          <h3 id="icv2-implementation-title" class="icv2__column-title">Реализация</h3>
        </div>
        <div class="icv2__stack" data-icv2-stack="implementation"></div>
      </section>

      <section class="icv2__column" data-icv2-column="construction" aria-labelledby="icv2-construction-title">
        <div class="icv2__column-head">
          <span class="icv2__eyebrow">Инженерия</span>
          <h3 id="icv2-construction-title" class="icv2__column-title">Конструкция</h3>
        </div>
        <div class="icv2__stack" data-icv2-stack="construction"></div>
      </section>
    </div>
  </div>

  <script type="application/json" id="icv2-data">
{
  "implementation": [
    {
      "number": "01",
      "title": "Система до старта",
      "support": "Решения фиксируются до начала работ — без импровизации на участке.\nПроект собирается под конкретный участок, а не по шаблону.",
      "description": "До начала работ проект собирается на понятных вводных: что нужно разместить, как будет использоваться гараж, где ограничения участка, какой подъезд, рельеф, вода, отступы и привязки. Это убирает ситуацию, когда половина решений появляется уже на монтаже и тянет переделки.\n\nГабариты, въезд, уклон, ориентация, соседние строения и реальные условия участка влияют на компоновку ещё до производства. За счёт этого проект не выглядит правильным только на экране, а нормально встаёт на местности без случайных компромиссов."
    },
    {
      "number": "02",
      "title": "Один контур ответственности",
      "support": "Проект ведёт конкретный человек, а не цепочка «спросите у другого».\nЭтапы заданы заранее и не меняются по ходу.",
      "description": "Когда за проектом закреплён ответственный, решения не расползаются между менеджером, бригадой и производством. Клиенту не приходится собирать картину по кускам: есть человек, который держит контекст, сроки, договорённости и переход между этапами.\n\nНормальный монтаж — это не набор импровизаций. Когда этапы, последовательность и узкие места продуманы заранее, снижается риск накладок, простоев, конфликтов между операциями и решений в стиле «потом додумаем»."
    },
    {
      "number": "03",
      "title": "Контроль каждого этапа",
      "support": "Каждый этап проверяется до перехода к следующему.\nСроки и обязательства зафиксированы заранее.",
      "description": "Большинство проблем появляется не в финале, а раньше — когда ошибка одного этапа прячется под следующим. Промежуточная проверка позволяет поймать отклонение вовремя и исправить его без потери качества и сроков.\n\nКогда сроки, состав работ, обязательства сторон и рамки результата зафиксированы, у проекта появляется рабочий контур ответственности. Меньше двусмысленности, меньше размытых обещаний, меньше пространства для хаоса."
    }
  ],
  "construction": [
    {
      "number": "01",
      "title": "Расчёт под реальные нагрузки",
      "support": "Конструкция учитывает снег, ветер и условия региона.\nМатериалы задаются системой, а не по ситуации.",
      "description": "Надёжность начинается с расчётной логики. Когда каркас и схема работы конструкции завязаны на реальные снеговые и ветровые воздействия, объект не существует только в рекламной логике «вроде должно стоять», а рассчитан на долгую эксплуатацию.\n\nЕсли материалы и элементы не заданы заранее, они начинают меняться по пути: где-то подбирается «аналог», где-то упрощается узел. Инженерная спецификация нужна, чтобы объект собирался как система, а не как набор случайно подходящих частей."
    },
    {
      "number": "02",
      "title": "Геометрия и узлы",
      "support": "Точность контролируется на сборке, а не «на глаз».\nКритические соединения продуманы заранее.",
      "description": "Гараж может выглядеть собранным и при этом уже иметь ошибки по осям, диагоналям и сопряжениям. Потом это проявляется в воротах, примыканиях, кровле и нагрузке на узлы. Поэтому геометрия — это основа корректной работы всей системы.\n\nИменно узлы часто определяют срок службы и устойчивость к нагрузке, вибрациям и температурным циклам. Когда соединения продуманы заранее и выполнены под задачу, конструкция работает как единое целое, а не как набор отдельных деталей."
    },
    {
      "number": "03",
      "title": "Завершённая система",
      "support": "Кровля, примыкания и водоотвод работают как единое целое.\nПеред сдачей объект проходит финальную проверку.",
      "description": "Проблемы с влагой часто начинаются не из-за одного элемента, а из-за разрыва между кровлей, примыканиями, стыками и отводом воды. Когда эти решения увязаны заранее, объект остаётся сухим и не требует постоянных доработок.\n\nФинальная проверка нужна не для галочки. В этот момент проект сверяется с тем, что было задумано и обещано: по геометрии, узлам, сопряжениям, функциональности и общему качеству исполнения."
    }
  ]
}
  </script>
</section>

<script>
(function () {
  const root = document.querySelector('.icv2');
  if (!root) return;

  const dataEl = document.getElementById('icv2-data');
  if (!dataEl) return;

  let data;
  try {
    data = JSON.parse(dataEl.textContent || '{}');
  } catch (error) {
    console.error('[icv2] failed to parse data:', error);
    return;
  }

  const stacks = {
    implementation: root.querySelector('[data-icv2-stack="implementation"]'),
    construction: root.querySelector('[data-icv2-stack="construction"]')
  };

  const cardRegistry = {
    implementation: [],
    construction: []
  };

  function escapeHtml(value) {
    return String(value)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#39;');
  }

  function createCard(item, columnKey, index) {
    const card = document.createElement('article');
    card.className = 'icv2-card';

    const cardId = `icv2-${columnKey}-${index + 1}`;
    const panelId = `${cardId}-panel`;

    const title = escapeHtml(item.title || '');
    const support = escapeHtml(item.support || '').replace(/\n/g, '<br>');
    const description = escapeHtml(item.description || '').replace(/\n{2,}/g, '<br><br>');

    card.innerHTML = `
      <button class="icv2-card__trigger" type="button" aria-expanded="false" aria-controls="${panelId}">
        <span class="icv2-card__number">${escapeHtml(item.number || '')}</span>
        <span class="icv2-card__copy">
          <h4 class="icv2-card__title">${title}</h4>
          <p class="icv2-card__support">${support}</p>
        </span>
      </button>
      <div class="icv2-card__panel" id="${panelId}" role="region" aria-label="${title}">
        <div class="icv2-card__body">
          <p class="icv2-card__description">${description}</p>
        </div>
      </div>
    `;

    const trigger = card.querySelector('.icv2-card__trigger');
    const panel = card.querySelector('.icv2-card__panel');
    const body = card.querySelector('.icv2-card__body');

    function setExpandedState(isOpen) {
      card.classList.toggle('is-open', isOpen);
      trigger.setAttribute('aria-expanded', String(isOpen));
    }

    function animateHeight(from, to) {
      panel.style.height = `${from}px`;
      panel.offsetHeight;
      panel.style.height = `${to}px`;
    }

    function openCard() {
      const startHeight = panel.getBoundingClientRect().height;
      setExpandedState(true);
      const targetHeight = body.scrollHeight;
      animateHeight(startHeight, targetHeight);
    }

    function closeCard() {
      const startHeight = panel.getBoundingClientRect().height || body.scrollHeight;
      setExpandedState(false);
      animateHeight(startHeight, 0);
    }

    trigger.addEventListener('click', function () {
      const isOpen = card.classList.contains('is-open');

      cardRegistry[columnKey].forEach(function (entry) {
        if (entry.card !== card && entry.card.classList.contains('is-open')) {
          entry.close();
        }
      });

      if (isOpen) {
        closeCard();
      } else {
        openCard();
      }
    });

    panel.addEventListener('transitionend', function (event) {
      if (event.propertyName !== 'height') return;
      if (card.classList.contains('is-open')) {
        panel.style.height = 'auto';
      }
    });

    return {
      card,
      open: openCard,
      close: closeCard
    };
  }

  ['implementation', 'construction'].forEach(function (columnKey) {
    const stack = stacks[columnKey];
    const items = Array.isArray(data[columnKey]) ? data[columnKey] : [];
    if (!stack || items.length === 0) return;

    items.forEach(function (item, index) {
      const entry = createCard(item, columnKey, index);
      stack.appendChild(entry.card);
      cardRegistry[columnKey].push(entry);
    });
  });

  window.addEventListener('resize', function () {
    ['implementation', 'construction'].forEach(function (columnKey) {
      cardRegistry[columnKey].forEach(function (entry) {
        if (!entry.card.classList.contains('is-open')) return;
        const panel = entry.card.querySelector('.icv2-card__panel');
        panel.style.height = 'auto';
      });
    });
  });
})();
</script>
</body>
</html>
