<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Implementation Construction</title>
  <link rel="stylesheet" href="./implementation-construction.css" />
</head>
<body>
  <section
    class="implementation-construction"
    aria-labelledby="implementation-construction-title"
    data-implementation-construction
    data-source="../site-body-content/implementation-construction.content.json"
  >
    <div class="implementation-construction__inner">
      <header class="implementation-construction__header">
        <h2 class="implementation-construction__title" id="implementation-construction-title">
          Вы инвестируете не в гараж — а в управляемый результат
        </h2>
        <p class="implementation-construction__subtitle">
          Процесс под контролем. Конструкция просчитана. Результат предсказуем.
        </p>
      </header>

      <div class="implementation-construction__layout">
        <section class="implementation-construction__column" aria-label="Реализация">
          <h3 class="implementation-construction__column-title"></h3>
          <div class="implementation-construction__accordion"></div>
        </section>

        <section class="implementation-construction__column" aria-label="Конструкция">
          <h3 class="implementation-construction__column-title"></h3>
          <div class="implementation-construction__accordion"></div>
        </section>
      </div>

      <p class="implementation-construction__footer"></p>
    </div>
  </section>

  <script src="./implementation-construction.js"></script>
</body>
</html>
