<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unified Navigation Preview</title>
  <link rel="stylesheet" href="./unified-navigation.css" />
</head>
<body>
  <section class="unified-navigation" aria-labelledby="unified-navigation-title">
    <div class="unified-navigation__inner">
      <header class="unified-navigation__intro" data-unified-navigation-intro>
        <p class="unified-navigation__eyebrow" data-unified-navigation-eyebrow></p>
        <h2 id="unified-navigation-title" class="unified-navigation__title"></h2>
        <p class="unified-navigation__subtitle"></p>
      </header>

      <div class="unified-navigation__diagram-shell">
        <div class="unified-navigation__diagram" data-unified-navigation-diagram>
          <ol class="unified-navigation__stages" data-unified-navigation-stages></ol>
        </div>
      </div>

      <div class="unified-navigation__transition" data-unified-navigation-transition aria-live="polite"></div>
    </div>
  </section>

  <script src="./unified-navigation.js"></script>
</body>
</html>
