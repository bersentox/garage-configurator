<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Unified Navigation Prototype</title>
  <link rel="stylesheet" href="./unified-navigation.css" />
</head>
<body>
  <section class="prototype-shell">
    <div class="scene" aria-label="Интерактивный узел навигации">
      <button class="main-node" type="button" aria-expanded="false">
        <span>Контакт</span>
      </button>

      <button class="step-node step-1" type="button">Шаг 1</button>
      <button class="step-node step-2" type="button">Шаг 2</button>
      <button class="step-node step-3" type="button">Шаг 3</button>
      <button class="step-node step-4" type="button">Шаг 4</button>
    </div>
  </section>

  <script src="./unified-navigation.js"></script>
</body>
</html>
