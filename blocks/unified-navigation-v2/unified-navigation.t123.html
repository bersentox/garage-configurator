<!-- Unified Navigation v2 — T123 single-file embed (copy all of this block) -->
<div id="unified-nav-t123">
  <section class="process-nav" data-process-nav aria-labelledby="process-nav-title">
    <header class="process-nav__header">
      <h2 id="process-nav-title" class="process-nav__title"></h2>
      <p class="process-nav__subtitle"></p>
    </header>

    <div class="process-nav__timeline" role="tablist" aria-label="Этапы проекта"></div>

    <div class="process-nav__branch" aria-live="polite"></div>
  </section>
</div>

<style>
#unified-nav-t123 {
  --process-bg: #eef2f7;
  --surface: #f5f8fc;
  --surface-strong: #ffffff;
  --line: #d8e1ef;
  --line-strong: #8ab0ff;
  --text-primary: #1f2736;
  --text-muted: #7e8aa0;
  --accent: #3d7ef5;
  --radius-pill: 999px;
  --radius-card: 30px;
  --shadow-soft: 0 14px 30px rgba(26, 41, 72, 0.08);
  --shadow-active: 0 10px 24px rgba(61, 126, 245, 0.16);
  --ease-premium: cubic-bezier(0.23, 1, 0.32, 1);
  background: var(--process-bg);
  padding: clamp(1.5rem, 4vw, 3rem) clamp(1rem, 3vw, 2rem) clamp(2.5rem, 5vw, 4rem);
}

#unified-nav-t123,
#unified-nav-t123 * {
  box-sizing: border-box;
}

#unified-nav-t123 .process-nav {
  width: min(1180px, 100%);
  margin-inline: auto;
  padding: clamp(1.5rem, 3vw, 2.5rem);
  color: var(--text-primary);
  font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  overflow-anchor: none;
}

#unified-nav-t123 .process-nav__header {
  text-align: center;
  margin-bottom: clamp(1.8rem, 4vw, 3.1rem);
}

#unified-nav-t123 .process-nav__title {
  margin: 0;
  font-size: clamp(1.9rem, 4vw, 3.25rem);
  font-weight: 700;
  line-height: 1.08;
  letter-spacing: -0.03em;
}

#unified-nav-t123 .process-nav__subtitle {
  margin: 0.9rem auto 0;
  max-width: 820px;
  color: var(--text-muted);
  font-size: clamp(0.95rem, 1.7vw, 1.45rem);
}

#unified-nav-t123 .process-nav__timeline {
  position: relative;
  display: grid;
  grid-template-columns: repeat(var(--stage-count, 1), minmax(0, 1fr));
  gap: clamp(0.4rem, 0.8vw, 0.75rem);
  align-items: center;
  padding: 0.3rem 0;
}

#unified-nav-t123 .process-nav__timeline::before {
  content: '';
  position: absolute;
  left: 2.4rem;
  right: 2.4rem;
  top: 50%;
  transform: translateY(-50%);
  border-top: 1px solid var(--line);
  z-index: 0;
}

#unified-nav-t123 .process-stage {
  position: relative;
  z-index: 1;
  min-height: 4.2rem;
  width: 100%;
  padding: 0.55rem 0.7rem 0.6rem;
  border: 1px solid #e3e9f3;
  border-radius: var(--radius-pill);
  background: #f3f7fb;
  color: var(--text-primary);
  font: inherit;
  display: inline-flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  gap: 0.15rem;
  font-weight: 600;
  cursor: pointer;
  transition: transform 300ms var(--ease-premium), box-shadow 300ms var(--ease-premium), border-color 300ms var(--ease-premium), background-color 300ms var(--ease-premium);
}

#unified-nav-t123 .process-stage__number {
  color: #aab4c4;
  font-size: 1.3rem;
  line-height: 1;
  font-weight: 600;
  transition: color 260ms ease;
}

#unified-nav-t123 .process-stage__title {
  font-size: 0.98rem;
  line-height: 1.1;
  text-align: center;
}

#unified-nav-t123 .process-stage.is-active {
  background: var(--surface-strong);
  border-color: #95b8ff;
  box-shadow: var(--shadow-active);
  transform: scale(1.03);
}

#unified-nav-t123 .process-stage.is-active .process-stage__number {
  color: var(--accent);
}

#unified-nav-t123 .process-nav__branch {
  --branch-offset: 0px;
  position: relative;
  width: min(380px, 100%);
  margin-top: 1.7rem;
  transform: translateX(var(--branch-offset));
  transition: opacity 220ms ease, min-height 260ms var(--ease-premium);
  overflow-anchor: none;
}

#unified-nav-t123 .process-nav__branch.is-closing {
  opacity: 0.45;
}

#unified-nav-t123 .process-step {
  position: relative;
  overflow: hidden;
  border: 1px solid #e4e9f2;
  border-radius: var(--radius-pill);
  background: var(--surface);
  margin-bottom: 0.9rem;
  transform-origin: top center;
  transition: border-color 260ms var(--ease-premium), border-radius 260ms var(--ease-premium), box-shadow 260ms var(--ease-premium), background-color 260ms var(--ease-premium), transform 260ms var(--ease-premium);
}

#unified-nav-t123 .process-step__trigger {
  all: unset;
  display: grid;
  grid-template-columns: auto 1fr;
  align-items: center;
  gap: 0.72rem;
  width: 100%;
  padding: 0.68rem 0.95rem;
  cursor: pointer;
  transition: padding 260ms var(--ease-premium);
}

#unified-nav-t123 .process-step__number {
  display: grid;
  place-items: center;
  width: 2.2rem;
  height: 2.2rem;
  border-radius: 50%;
  background: #eaf0f9;
  color: #7595d8;
  font-weight: 700;
  transition: background-color 260ms ease, color 260ms ease;
}

#unified-nav-t123 .process-step__title {
  font-size: 0.98rem;
  font-weight: 600;
  line-height: 1.25;
}

#unified-nav-t123 .process-step__detail {
  max-height: 0;
  opacity: 0;
  overflow: hidden;
  padding: 0 1.25rem;
  transform: translateY(-0.5rem) scale(0.99);
  transition: max-height 260ms var(--ease-premium), opacity 240ms ease, padding 260ms var(--ease-premium), transform 260ms var(--ease-premium);
}


#unified-nav-t123 .process-step__detail-text {
  margin: 0.72rem 0 0;
  color: var(--text-muted);
  line-height: 1.55;
}

#unified-nav-t123 .process-step.is-expanded {
  border-color: var(--line-strong);
  border-radius: var(--radius-card);
  box-shadow: var(--shadow-soft);
  background: var(--surface-strong);
  transform: translateY(0);
  transition-duration: 320ms, 320ms, 320ms, 320ms, 320ms;
}

#unified-nav-t123 .process-step.is-expanded .process-step__trigger {
  padding-top: 0.82rem;
  padding-bottom: 0.78rem;
  transition-duration: 320ms;
}

#unified-nav-t123 .process-step.is-expanded .process-step__number {
  background: #e1ebff;
  color: var(--accent);
}

#unified-nav-t123 .process-step.is-expanded .process-step__detail {
  max-height: 24rem;
  opacity: 1;
  padding: 0.35rem 1.25rem 1.25rem;
  transform: translateY(0) scale(1);
  transition-duration: 320ms, 240ms, 320ms, 320ms;
}

#unified-nav-t123 .process-nav__branch.is-entering {
  opacity: 0.82;
}

#unified-nav-t123 .process-nav__branch.is-entering .process-step {
  opacity: 0;
  transform: translateY(-20px) scale(0.97);
  animation: step-drop 420ms var(--ease-premium) forwards;
  animation-delay: calc(var(--step-index, 0) * 70ms);
}

@keyframes step-drop {
  to {
    opacity: 1;
    transform: translateY(0) scale(1);
  }
}

#unified-nav-t123 .process-nav__error {
  color: #c2410c;
  padding: 1rem;
  background: #fff7ed;
  border-radius: 12px;
  border: 1px solid #fdba74;
}

@media (max-width: 1024px) {
  #unified-nav-t123 .process-stage__title {
    font-size: 0.92rem;
  }
}

@media (max-width: 960px) {
  #unified-nav-t123 .process-nav__timeline {
    display: flex;
    gap: 0.55rem;
    overflow-x: auto;
    padding-bottom: 0.55rem;
    scrollbar-width: thin;
  }

  #unified-nav-t123 .process-nav__timeline::before {
    left: 1.4rem;
    right: 1.4rem;
  }

  #unified-nav-t123 .process-stage {
    width: 154px;
    min-width: 154px;
  }

  #unified-nav-t123 .process-nav__branch {
    width: 100%;
    max-width: none;
    margin-top: 1.45rem;
    transform: none;
  }

}

</style>

<script>
(() => {
  const UNIFIED_NAV_DATA = {"title": "Весь путь проекта — от звонка до сдачи", "subtitle": "Каждый этап связан со следующим, проходит согласование и контроль перед переходом дальше.", "stages": [{"number": "01", "title": "Контакт", "steps": [{"number": "01", "title": "Приём обращения", "detailText": "Фиксируем исходный запрос и точку входа, чтобы дальнейшие действия опирались на подтверждённый контакт."}, {"number": "02", "title": "Уточнение задачи и адреса участка", "detailText": "Собираем ключевые вводные по задаче, локации и ограничениям участка до перехода к выезду."}, {"number": "03", "title": "Согласование времени контакта и выезда", "detailText": "Подтверждаем следующий шаг, чтобы замер стартовал в заранее согласованном окне без потери контекста."}]}, {"number": "02", "title": "Замер", "steps": [{"number": "01", "title": "Выезд на участок", "detailText": "Начинаем процесс с фактического осмотра площадки, чтобы перейти от предположений к измеряемым данным."}, {"number": "02", "title": "Фиксация ограничений и подъезда", "detailText": "Документируем рельеф, подъезд, зазоры и все условия, которые влияют на проект и монтаж."}, {"number": "03", "title": "Передача данных в расчётный контур", "detailText": "Передаём подтверждённые размеры и ограничения дальше, чтобы коммерческое предложение строилось на реальной базе."}]}, {"number": "03", "title": "Задание и КП", "steps": [{"number": "01", "title": "Формирование задания на проектирование", "detailText": "Собираем входные данные в подтверждённый пакет, чтобы следующий шаг опирался на зафиксированные вводные, а не на догадки."}, {"number": "02", "title": "Коммерческое предложение", "detailText": "Переводим задачу в понятный расчёт стоимости и состава работ, сохраняя связь с уже подтверждёнными параметрами."}, {"number": "03", "title": "Отправление для подтверждения начала проектирования", "detailText": "Фиксируем решение клиента по старту проектирования, чтобы без разрыва перейти к инженерной проработке."}]}, {"number": "04", "title": "Проектирование", "steps": [{"number": "01", "title": "Разработка проектной схемы", "detailText": "Собираем конструктивную модель проекта, где ключевые узлы уже увязаны между собой как единая система."}, {"number": "02", "title": "Проверка узлов и материалов", "detailText": "Сверяем материалы, нагрузки и спецификацию, чтобы не переносить инженерные риски в следующий этап."}, {"number": "03", "title": "Согласование проектного решения", "detailText": "Подтверждаем итоговую схему с клиентом и внутри команды перед фиксацией договорных обязательств."}]}, {"number": "05", "title": "Договор", "steps": [{"number": "01", "title": "Фиксация состава работ", "detailText": "Подтверждаем объём работ и состав решения, чтобы в реализации не возникало плавающих трактовок."}, {"number": "02", "title": "Подтверждение сроков и стоимости", "detailText": "Закрепляем сроки, стоимость и порядок исполнения как управляемые обязательства сторон."}, {"number": "03", "title": "Запуск исполнения по договору", "detailText": "После фиксации условий переводим проект в исполнение без повторного согласования уже утверждённых параметров."}]}, {"number": "06", "title": "Реализация", "steps": [{"number": "01", "title": "Подготовка производства и поставки", "detailText": "Готовим материалы, производство и логистику как связанную последовательность перед выходом на объект."}, {"number": "02", "title": "Монтаж и контроль геометрии", "detailText": "Монтаж идёт вместе с промежуточной проверкой геометрии, чтобы качество сохранялось на каждом переходе."}, {"number": "03", "title": "Финальная проверка перед сдачей", "detailText": "Перед передачей клиенту проводим финальную проверку, подтверждая готовность объекта к закрытию проекта."}]}, {"number": "07", "title": "Сдача", "steps": [{"number": "01", "title": "Приёмочный контроль объекта", "detailText": "Проверяем объект по финальным критериям, чтобы передача результата опиралась на подтверждённое качество."}, {"number": "02", "title": "Передача результата клиенту", "detailText": "Передаём результат, документы и подтверждения как завершённый пакет, а не как набор разрозненных файлов."}, {"number": "03", "title": "Подтверждение закрытия проекта", "detailText": "Фиксируем закрытие проекта и убираем незавершённые хвосты, чтобы цикл завершился управляемо и прозрачно."}]}]};

  const STAGE_CLOSE_MS = 140;
  const BRANCH_ENTER_CLEAR_MS = 520;

  const rootHost = document.getElementById('unified-nav-t123');
  if (!rootHost) return;

  const root = rootHost.querySelector('[data-process-nav]');
  if (!root) return;

  const titleEl = root.querySelector('.process-nav__title');
  const subtitleEl = root.querySelector('.process-nav__subtitle');
  const timelineEl = root.querySelector('.process-nav__timeline');
  const branchEl = root.querySelector('.process-nav__branch');

  const state = {
    activeStageIndex: 0,
    expandedStepIndex: 0,
    data: UNIFIED_NAV_DATA,
    isStageSwitching: false
  };

  const clampIndex = (value, max) => (max <= 0 ? 0 : Math.min(Math.max(value, 0), max - 1));
  const updateBranchAnchor = () => {
    if (window.matchMedia('(max-width: 960px)').matches) {
      branchEl.style.setProperty('--branch-offset', '0px');
      return;
    }

    const activeStageEl = timelineEl.querySelector(`[data-stage-index="${state.activeStageIndex}"]`);
    if (!activeStageEl) return;

    const timelineRect = timelineEl.getBoundingClientRect();
    const stageRect = activeStageEl.getBoundingClientRect();
    const stageCenterX = stageRect.left - timelineRect.left + stageRect.width / 2;
    const branchWidth = branchEl.getBoundingClientRect().width;
    const maxOffset = Math.max(timelineEl.clientWidth - branchWidth, 0);
    const offset = Math.max(0, Math.min(stageCenterX - branchWidth / 2, maxOffset));

    branchEl.style.setProperty('--branch-offset', `${offset}px`);
  };

  const renderTimeline = () => {
    timelineEl.style.setProperty('--stage-count', String(state.data.stages.length));
    timelineEl.innerHTML = state.data.stages
      .map((stage, index) => {
        const activeClass = index === state.activeStageIndex ? ' is-active' : '';
        return `
          <button
            class="process-stage${activeClass}"
            type="button"
            role="tab"
            aria-selected="${index === state.activeStageIndex}"
            aria-controls="process-branch"
            data-stage-index="${index}"
          >
            <span class="process-stage__number">${stage.number}</span>
            <span class="process-stage__title">${stage.title}</span>
          </button>
        `;
      })
      .join('');
  };

  const setExpandedStep = (nextStepIndex) => {
    const currentExpanded = branchEl.querySelector('.process-step.is-expanded');
    const nextExpanded = branchEl.querySelector(`.process-step[data-step-index="${nextStepIndex}"]`);
    if (!nextExpanded || currentExpanded === nextExpanded) return;

    if (currentExpanded) {
      currentExpanded.classList.remove('is-expanded');
      const currentTrigger = currentExpanded.querySelector('.process-step__trigger');
      if (currentTrigger) currentTrigger.setAttribute('aria-expanded', 'false');
    }

    nextExpanded.classList.add('is-expanded');
    const nextTrigger = nextExpanded.querySelector('.process-step__trigger');
    if (nextTrigger) nextTrigger.setAttribute('aria-expanded', 'true');

    state.expandedStepIndex = nextStepIndex;
  };

  const renderBranch = ({ entering = false } = {}) => {
    const activeStage = state.data.stages[state.activeStageIndex];
    const safeExpandedIndex = clampIndex(state.expandedStepIndex, activeStage.steps.length);

    state.expandedStepIndex = safeExpandedIndex;
    branchEl.id = 'process-branch';
    branchEl.classList.remove('is-entering');
    branchEl.innerHTML = activeStage.steps
      .map((step, index) => {
        const expandedClass = index === safeExpandedIndex ? ' is-expanded' : '';
        return `
          <article class="process-step${expandedClass}" data-step-index="${index}" style="--step-index:${index};">
            <button
              type="button"
              class="process-step__trigger"
              aria-expanded="${index === safeExpandedIndex}"
              data-step-index="${index}"
            >
              <span class="process-step__number">${step.number}</span>
              <span class="process-step__compact">
                <span class="process-step__title">${step.title}</span>
              </span>
            </button>
            <div class="process-step__detail">
              <p class="process-step__detail-text">${step.detailText}</p>
            </div>
          </article>
        `;
      })
      .join('');

    updateBranchAnchor();

    if (entering) {
      branchEl.classList.add('is-entering');
      window.setTimeout(() => {
        branchEl.classList.remove('is-entering');
      }, BRANCH_ENTER_CLEAR_MS);
    }
  };

  const switchStage = (nextStageIndex) => {
    if (state.isStageSwitching || nextStageIndex === state.activeStageIndex) return;

    state.isStageSwitching = true;
    const previousBranchHeight = branchEl.getBoundingClientRect().height;
    branchEl.style.minHeight = `${previousBranchHeight}px`;
    branchEl.classList.add('is-closing');

    // Immediate click feedback: active stage updates immediately.
    state.activeStageIndex = nextStageIndex;
    state.expandedStepIndex = 0;
    renderTimeline();
    renderBranch({ entering: true });

    const nextBranchHeight = branchEl.getBoundingClientRect().height;
    branchEl.style.minHeight = `${Math.max(previousBranchHeight, nextBranchHeight)}px`;

    window.setTimeout(() => {
      branchEl.classList.remove('is-closing');
      state.isStageSwitching = false;
    }, STAGE_CLOSE_MS);

    window.setTimeout(() => {
      branchEl.style.minHeight = '';
    }, BRANCH_ENTER_CLEAR_MS);
  };

  timelineEl.addEventListener('click', (event) => {
    const trigger = event.target.closest('[data-stage-index]');
    if (!trigger) return;

    const nextStageIndex = Number.parseInt(trigger.dataset.stageIndex, 10);
    if (!Number.isNaN(nextStageIndex)) switchStage(nextStageIndex);
  });

  branchEl.addEventListener('click', (event) => {
    const trigger = event.target.closest('[data-step-index]');
    if (!trigger || state.isStageSwitching) return;

    const nextStepIndex = Number.parseInt(trigger.dataset.stepIndex, 10);
    if (!Number.isNaN(nextStepIndex) && nextStepIndex !== state.expandedStepIndex) {
      setExpandedStep(nextStepIndex);
    }
  });

  window.addEventListener('resize', updateBranchAnchor);

  titleEl.textContent = state.data.title || '';
  subtitleEl.textContent = state.data.subtitle || '';
  renderTimeline();
  renderBranch({ entering: true });
})();
</script>
