<section id="configuratorStep" class="configurator-step" hidden>
  <h2>Шаг 2. Параметры гаража</h2>

  <div class="configurator-layout">
    <label>
      Длина:
      <select id="lengthSelect">
        <option value="6">6 м</option>
        <option value="8">8 м</option>
        <option value="10">10 м</option>
        <option value="12">12 м</option>
      </select>
    </label>

    <label>
      Тип ворот:
      <select id="gateTypeSelect">
        <option value="sectional">Секционные</option>
        <option value="swing">Распашные</option>
      </select>
    </label>

    <label>
      Цвет:
      <select id="colorSelect">
        <option value="graphite">Графит</option>
        <option value="brown">Коричневый</option>
        <option value="white">Белый</option>
      </select>
    </label>
  </div>

  <pre id="stateOutput" class="state-output"></pre>
</section>
